<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Memo Notepad</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Style Sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header class="header-bar">
            <h1><i class="fa-solid fa-note-sticky"></i> Premium Memo</h1>
            <div class="header-actions">
                <div id="authSection">
                    <button id="googleLoginBtn" class="google-login-btn">
                        <i class="fa-brands fa-google"></i> Google 로그인
                    </button>
                    <div id="userProfile" style="display: none;">
                        <span id="userName" class="user-name"></span>
                        <button id="logoutBtn" class="logout-btn" title="로그아웃">
                            <i class="fa-solid fa-right-from-bracket"></i>
                        </button>
                    </div>
                </div>
                <button class="theme-btn" id="themeToggle" aria-label="Toggle theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </header>

        <!-- Input Section -->
        <section class="input-section">
            <form id="memoForm">
                <div class="input-group">
                    <input type="text" id="memoInput" placeholder="새로운 메모를 입력하세요..." autocomplete="off" required>
                    <button type="submit" class="add-btn">
                        <span>추가</span>
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
            </form>
        </section>

        <!-- Stats & Actions Bar -->
        <div class="list-info-bar">
            <span id="memoCount">전체 메모: 0개</span>
            <button class="clear-all-btn" id="clearAllBtn" onclick="clearAllMemos()" style="display: none;">
                <i class="fa-solid fa-trash-can"></i> 전체 삭제
            </button>
        </div>

        <!-- Memos List -->
        <ul class="memo-list" id="memoList">
            <!-- Memo items injected dynamically -->
        </ul>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toastMessage">작업이 완료되었습니다.</span>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- JS Script -->
    <script src="app.js"></script>
</body>
</html>
